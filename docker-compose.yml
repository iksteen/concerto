services:
  concerto:
    build: .
    image: concerto
    restart: unless-stopped
    # Optional overrides (LOG_LEVEL etc.); tokens now live in concerto.toml.
    env_file:
      - path: .env
        required: false
    environment:
      # Container-correct values that take precedence over anything in .env.
      HOST: 0.0.0.0
      PORT: "8000"
      CONCERTO_DB_PATH: /data/concerto.db
      CONCERTO_CONFIG: /config/concerto.toml
    ports:
      - "8000:8000"
    volumes:
      # Named volume keeps the SQLite database across restarts and updates.
      - concerto-data:/data
      # Your connector config (copy concerto.toml.example -> concerto.toml).
      - ./concerto.toml:/config/concerto.toml:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://localhost:8000/healthz")
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  concerto-data:
