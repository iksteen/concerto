services:
  concerto:
    build: .
    image: concerto
    restart: unless-stopped
    # Provides SLACK_BOT_TOKEN and SLACK_APP_TOKEN (and any other overrides).
    env_file: .env
    environment:
      # Container-correct values that take precedence over anything in .env.
      HOST: 0.0.0.0
      PORT: "8000"
      CONCERTO_DB_PATH: /data/concerto.db
    ports:
      - "8000:8000"
    volumes:
      # Named volume keeps the SQLite database across restarts and updates.
      - concerto-data:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://localhost:8000/healthz")
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  concerto-data:
